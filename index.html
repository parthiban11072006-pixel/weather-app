<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather App</title>
    <style>
        /* INGA THAAN NEE KETTA CSS CODE-AH POTTURUKKEN */
        body {
            transition: background 0.8s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a; /* Blackish background for better visibility */
        }

        .container {
            background: #e0e5ec; /* Card color */
            padding: 30px;
            border-radius: 30px;
            width: 350px;
            text-align: center;
            /* Intha shadow thaan antha card "kattam" look-ah tharum */
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }

        h2 {
            color: #31344b;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 80%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: #e0e5ec;
            box-shadow: inset 2px 2px 5px #b8b9be, inset -3px -3px 7px #ffffff;
            margin-bottom: 10px;
            color: #31344b;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #e0e5ec;
            box-shadow: 3px 3px 6px #b8b9be, -3px -3px 6px #ffffff;
            cursor: pointer;
            font-weight: bold;
            color: #31344b;
            margin: 5px;
        }

        button:active {
            box-shadow: inset 2px 2px 5px #b8b9be, inset -3px -3px 7px #ffffff;
        }

        /* Weather results visibility fix */
        .result-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 20px;
            background-color: #ffffff; /* Inside card white-ah irukkum so words nalla theriyum */
            color: #31344b;
            box-shadow: inset 2px 2px 5px #b8b9be;
            min-height: 100px;
        }

        #locationBtn {
            color: #ff5e62;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Weather App</h2>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <br>
            <button id="searchBtn">Get Weather</button>
            <button id="locationBtn">📍 Location</button>
        </div>
        
        <div id="weatherResult" class="result-area">
            <p style="color: #666;">Enter a city to see updates</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
